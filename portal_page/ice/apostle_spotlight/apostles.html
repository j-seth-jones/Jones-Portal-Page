<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostle Spotlight</title> 
    <link rel="stylesheet" href="apostles.css">
</head> 
<body>

    <div class="container">
        <h1>First Presidency</h1>
        <div class="first-presidency">
            <div class="apostle">
                <img class="bottom-img left" src="images/christofferson.webp" alt="D. Todd Christofferson">
            </div>
            <div class="prophet">
                <img src="images/oaks.webp" alt="Dallin H. Oaks">
            </div>
            <div class="apostle">
                <img class="bottom-img right" src="images/eyring.webp" alt="Henry B. Eyring">
            </div>
        </div>

        <h2>Quorum of the Twelve Apostles</h2>
        <div class="apostles">
            <div class="apostle"><img src="images/holland.webp" alt="Jeffrey R. Holland"></div>
            <div class="apostle"><img src="images/uchtdorf.webp" alt="Dieter F. Uchtdorf"></div>
            <div class="apostle"><img src="images/bednar.webp" alt="David A. Bednar"></div>
            <div class="apostle"><img src="images/cook.webp" alt="Quentin L. Cook"></div>
            <div class="apostle"><img src="images/anderson.webp" alt="Neil L. Andersen"></div>
            <div class="apostle"><img src="images/rasband.webp" alt="Ronald A. Rasband"></div>
            <div class="apostle"><img src="images/stevenson.webp" alt="Gary E. Stevenson"></div>
            <div class="apostle"><img src="images/renlund.webp" alt="Dale G. Renlund"></div>
            <div class="apostle"><img src="images/gong.webp" alt="Gerrit W. Gong"></div>
            <div class="apostle"><img src="images/soares.webp" alt="Ulisses Soares"></div>
            <div class="apostle"><img src="images/kearon.webp" alt="Patrick Kearon"></div>
            <div class="apostle"><img src="images/causse.webp" alt="Gérald Caussé"></div>
        </div>
    </div>

</body>
</html>
